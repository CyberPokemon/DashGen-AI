<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DashGen AI</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header>
        <h1>DashGen AI</h1>
    </header>

    <div class="container">

        <!-- Upload Dataset -->
        <div class="card">

            <h2>Upload Dataset</h2>

            <input type="file" id="fileInput">
            <button onclick="uploadFile()">Upload</button>

        </div>

        <!-- Ask Question -->
        <div class="card">

            <h2>Ask Your Data</h2>

            <textarea id="question" placeholder="Ask a query..."></textarea>

            <button onclick="generateDashboard()">Generate Dashboard</button>

        </div>


        <!-- AI Summary -->
        <div class="card">

            <h2>AI Summary</h2>

            <div id="summary">
                Waiting for AI response...
            </div>

        </div>

        <!-- Table Section -->
        <div class="card">

            <h2>Result Table</h2>

            <div id="table-container"></div>

        </div>


        <!-- Chart Section -->
        <div class="card">

            <h2>Visualization</h2>

            <div class="chart-container">
                <canvas id="chartCanvas"></canvas>
            </div>

        </div>



        <!-- AI Advice -->
        <div class="card">

            <h2>AI Recommendation</h2>

            <div id="advice" class="recommended-box"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
