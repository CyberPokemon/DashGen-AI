<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Business Intelligence Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>AI Business Intelligence Dashboard</h1>
</header>

<div class="container">

<!--
<div class="card">
<h2>Upload Dataset</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

</div>
-->

<div class="card">

<h2>Ask Your Data</h2>

<textarea id="queryInput" placeholder="Example: Show sales by region"></textarea>

<label>Select Chart Type:</label>

<select id="chartType">
  <option value="bar">Bar Chart</option>
  <option value="pie">Pie Chart</option>
  <option value="line">Line Chart</option>
  <option value="doughnut">Doughnut Chart</option>
  <option value="radar">Radar Chart</option>
  <option value="polarArea">Polar Area Chart</option>
</select>

<button onclick="sendQuery()">Generate Dashboard</button>

</div>


<!-- Chart Section -->
<div class="card">

<h2>Visualization</h2>

<div class="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

</div>


<!-- Table Section -->
<div class="card">

<h2>Result Table</h2>

<table id="resultTable">
<thead></thead>
<tbody></tbody>
</table>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
